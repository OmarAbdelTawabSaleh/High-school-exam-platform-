        const shuffleArray = (array) => {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        };

            // Fetch Data & Top Student
            // Fetch Data & Top Students
useEffect(() => {

    // جلب أعلى 4 نتائج (نجوم المنصة)
database.ref('results').orderByChild('score').limitToLast(50).on('value', snap => {
    const data = snap.val();
    if(data) {
        const resultsArray = Object.values(data);

        // التصفية: نأخذ فقط أعلى درجة لكل اسم فريد
        const uniqueStudents = Object.values(resultsArray.reduce((acc, current) => {
            const studentName = current.name.trim(); // تنظيف الاسم من المسافات
            if (!acc[studentName] || current.score > acc[studentName].score) {
                acc[studentName] = current;
            }
            return acc;
        }, {}));

        // الترتيب التنازلي وأخذ أول 5 فقط
        const sortedList = uniqueStudents
            .sort((a, b) => b.score - a.score)
            .slice(0, 5);

        setTopStudent(sortedList); 
    }
});

}, []);
